    </footer>
    <!-- Script para el boton de cambio de tema oscuro/claro -->
    <script>
        const botonTema = document.getElementById("botonTema");
        const body = document.body;
        const logoPrincipal = document.querySelector(".logo .logoVector, .logo img");
        const logoModoDark = "img/logo/logoD.svg?v=5";
        const logoModoLight = "img/logo/logoL.svg?v=5";

        const actualizarLogoTema = () => {
            if (!logoPrincipal) {
                return;
            }
            const logoObjetivo = body.classList.contains("temaOscuro") ? logoModoLight : logoModoDark;

            if (logoPrincipal.tagName.toLowerCase() === "object") {
                if (logoPrincipal.getAttribute("data") !== logoObjetivo) {
                    logoPrincipal.setAttribute("data", logoObjetivo);
                }
            } else {
                logoPrincipal.src = logoObjetivo;
            }
        };

        actualizarLogoTema();

        botonTema.addEventListener("click", () => {
            body.classList.toggle("temaOscuro");
            actualizarLogoTema();

            // if (body.classList.contains("temaOscuro")) {
            //     botonTema.background = "Ø";
            // } else {
            //     botonTema.textContent = "O";
            // }
        });
    </script>
